<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="author" content="">
    <title>Contact</title>
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
    <header>
        <h1>Contact Me</h1>
        <nav>
            <ul>
                <li><a href="/portfolio-website/index.html">Home</a></li>
                <li><a href="/portfolio-website/projects.html">Projects</a></li>
                <li><a href="/portfolio-website/contact.html">Contact</a></li>
                <li><a href="/portfolio-website/about.html">About</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section>
            <h2>Get In Touch</h2>
            
            <form method="post">
                <label for="fname">Name</label>
                <input type="text" id="fname" name="fname" placeholder="Name">
                <br>

                <label for="email">Email</label>
                <input type="text" id="email" name="email" placeholder="example@email.com">
                <br>

                <label>Reason for message:</label>
                <select name="reason">
                    <option value=""></option>
                    <option value="software development">Software Development</option>
                    <option value="recruitment">Recruitment</option>
                    <option value="consultation">Consultation</option>
                    <option value="life advice(lol)">Life Advice(lol)</option>
                    <option value="other">Other</option>
                </select>
                <br><br>

                <label>Potential...?</label>
                <input type="radio" id="business-partner" name="potential" value="potential" checked>
                <label for="business-partner">Business Partner</label>
                <input type="radio" id="customer" value="customer" name="potential">
                <label for="customer">Customer</label>
                <input type="radio" id="friend" value="friend" name="potential">
                <label for="friend">Friend</label>
                <br>

                <label for="txtmessage">Message</label>
                <textarea id="txtmessage" name="txtmessage" rows="5" cols="50" placeholder="Enter your message here..."></textarea>
                <br>

                <!-- Missing: labels, more input types, validation -->
                
                
                
                <button type="submit">Send</button>
            </form>
        </section>
    </main>
    
    <footer>
        <p>Contact me at email@example.com</p>
    </footer>
</body>
</html>
