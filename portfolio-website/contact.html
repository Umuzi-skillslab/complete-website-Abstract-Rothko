<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="">
    <meta name="author" content="">
    <title>Contact</title>
    <link rel="stylesheet" href="../css/styles.css">
</head>
<body>
    <header>
        <h1>Contact Me</h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="projects.html">Projects</a></li>
                <li><a href="contact.html">Contact</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
    </header>

    <main>
        <section class="form-container">
            <h2>Get In Touch</h2>
            
            <form method="POST">
                <section class="form-group">
                    <label for="fname">Name:</label>
                    <input type="text" id="fname" name="fname" minlength="2" maxlength="30" placeholder="Name" required>
                </section>

                <section class="form-group">
                    <label for="email">Email:</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com" pattern="[a-z0-9._%+-]+@[a-z0-9.-]+\.[a-z]{2,}$" title="Please enter a valid email address (e.g., name@domain.com)" required>
                </section>

                <section class="form-group">
                    <label for="phone">Phone:</label>
                    <input type="tel" id="phone" name="phone" placeholder="0712345678" title="Please enter a valid numuber(eg. 0712345678 or +27712345678)" pattern="^(\+27|0)[6-8][0-9]{8}$" required>
                </section>

                <section class="form-group">
                    <label for="reason">Reason for message:</label>
                    <select id="reason" name="reason">
                        <option value="" disabled selected hidden>Select reason</option>
                        <option value="software development">Software Development</option>
                        <option value="recruitment">Recruitment</option>
                        <option value="consultation">Consultation</option>
                        <option value="life advice(lol)">Life Advice(lol)</option>
                        <option value="other">Other</option>
                    </select>
                </section>

                <fieldset class="form-group">
                    <legend>Preferred Communication:</legend>
                    <input type="radio" id="choose-call" value="choose-call" name="chosen-contact" checked>
                    <label for="choose-call">Call</label>
                    <input type="radio" id="choose-email" value="choose-email" name="chosen-contact">
                    <label for="choose-email">Email</label>
                </fieldset>

                <section class="form-group">
                    <label for="txtmessage">Message</label>
                    <textarea id="txtmessage" name="txtmessage" rows="5" placeholder="Enter your message here..." required></textarea>
                </section>

                <section class="form-button">
                    <button class="btn" type="submit">Send Message</button>
                </section>
            </form>
        </section>
    </main>
    
    <footer>
        <p>Contact me at <a href="mailto:email@example.com">email@example.com</a></p>
    </footer>
</body>
</html>
