    <main>
        <section>
            <h2>Get In Touch</h2>
            
            <form method="post">
                <label for="fname">Name</label>
                <input type="text" id="fname" name="fname" placeholder="Name">
                <label for="email">Email</label>
                <input type="text" id="email" name="email" placeholder="example@email.com">
                <label for="txtmessage">Message</label>
                <textarea id="txtmessage" name="txtmessage" placeholder="Message"></textarea>
                
                <!-- Missing: labels, more input types, validation -->
                <fieldset id="work-type">
                    <input type="radio" value="potential customer" name="work-type" checked> Potential friend
                    <input type="radio" value="potential friend" name="work-type">Potential Customer
                </fieldset>
                <button type="submit">Send</button>
            </form>
        </section>
    </main>
    
    <footer>
        <p>Contact me at email@example.com</p>
    </footer>
